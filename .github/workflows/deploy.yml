name: Production deployment

on:
  workflow_dispatch:

jobs:
  deploy:
    name: "Deploy to production"
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
      - name: Install dependencies
        run: pnpm install
      - name: Build project
        run: pnpm run build
        env:
          VITE_INFERENCE_BACKEND_URL: ${{ secrets.VITE_INFERENCE_BACKEND_URL }}
          VITE_THIRDWEB_CLIENT_ID: ${{ secrets.THIRDWEB_CLIENT_ID }}
          VITE_SOLANA_RPC: ${{ secrets.SOLANA_RPC }}
          VITE_LTAI_BASE_ADDRESS: ${{ secrets.LTAI_BASE_ADDRESS }}
          VITE_LTAI_SOLANA_ADDRESS: ${{ secrets.LTAI_SOLANA_ADDRESS }}

      - name: Deploy with Aleph
        uses: aleph-im/web3-hosting-action@v2.0.0
        with:
          path: 'dist'
          private-key: ${{ secrets.ALEPH_PRIVATE_KEY }}
          owner-address: ${{ vars.ALEPH_OWNER_ADDRESS }}
          domain: analytics.libertai.io
          retention_days: 1
